directories:
  output: dist
  buildResources: build
appId: eu.georail.schedule
productName: MTR Schedule Manager
copyright: GeoRail
files:
  - filter:
      - electron/**/*
      - src/**/*
      - public/**/*
      - server.js
      - config.js
      - package.json
      - '!**/*.map'
      - '!data/**'
      - '!dist/**'
      - '!diagnose-missing-route.js'
      - pending-changelog.json
asar: true
asarUnpack:
  - public/**
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: MTRScheduleManager-Setup-${version}.${ext}
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MTR Schedule Manager
  runAfterFinish: true
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
  artifactName: MTRScheduleManager-${version}.${ext}
mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.utilities
  artifactName: MTRScheduleManager-${version}.${ext}
electronVersion: 31.7.7
