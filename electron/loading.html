<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>GeoRail</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: #0f1115;
    color: #e5e7eb;
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    overflow: hidden;
  }
  .wrap {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 26px;
  }
  .logo {
    width: 92px; height: 92px;
    border-radius: 22px;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 18px 50px rgba(99, 102, 241, .35);
  }
  .logo svg { width: 52px; height: 52px; }
  .title { font-size: 22px; font-weight: 650; letter-spacing: .3px; }
  .sub { font-size: 13px; color: #9ca3af; margin-top: -14px; }
  .bar {
    width: 220px; height: 4px; border-radius: 4px;
    background: #1d212b; overflow: hidden; position: relative;
  }
  .bar::after {
    content: ""; position: absolute; inset: 0;
    width: 40%; border-radius: 4px;
    background: linear-gradient(90deg, #6366f1, #38bdf8);
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0% { left: -40%; }
    100% { left: 100%; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="3" width="14" height="14" rx="3"/>
        <path d="M5 11h14"/>
        <circle cx="8.5" cy="14" r="1"/>
        <circle cx="15.5" cy="14" r="1"/>
        <path d="M8 17l-2 4M16 17l2 4"/>
      </svg>
    </div>
    <div style="text-align:center">
      <div class="title">GeoRail</div>
      <div class="sub">запуск сервера расписания…</div>
    </div>
    <div class="bar"></div>
  </div>
</body>
</html>
